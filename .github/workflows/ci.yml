name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: packages/ronin-server-ts

jobs:
  unit:
    name: typecheck · lint · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/ronin-server-ts/package-lock.json
      - run: npm ci
      - run: npm run typecheck   # self-builds @ronin/fhir-types dist first
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run build

  security:
    name: supply-chain (audit · SBOM · pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/ronin-server-ts/package-lock.json
      - run: npm ci
      - name: npm audit (fail on high/critical)
        run: npm run audit
      - name: Install linked workspace deps (for a complete SBOM tree)
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: packages/ronin-fhir-types
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: packages/ronin-server-ts/sbom.cdx.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit (sidecar deps)
        working-directory: packages/ronin-server-ts/sidecar
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  scan:
    name: secret + vuln scan (gitleaks · trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scanning
      - name: gitleaks (secret scan, full history)
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar xz gitleaks
          ./gitleaks detect --source "$GITHUB_WORKSPACE" --no-banner --redact --exit-code 1
      - name: Trivy (deps + IaC/Dockerfile misconfig + secrets)
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.55.0
          trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed "$GITHUB_WORKSPACE"

  integration:
    name: delta integration (sidecar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/ronin-server-ts/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Install sidecar deps
        working-directory: packages/ronin-server-ts/sidecar
        run: pip install -r requirements.txt
      - name: Start delta sidecar
        run: |
          python sidecar/delta_sidecar.py --port 8077 --base ./.delta-ci &
          for i in $(seq 1 60); do curl -fsS http://127.0.0.1:8077/health && break; sleep 1; done
      - name: Delta integration tests
        env:
          RONIN_DELTA_SIDECAR_URL: http://127.0.0.1:8077
          RONIN_DELTA_BASE: ./.delta-ci
        run: npm run test:delta
