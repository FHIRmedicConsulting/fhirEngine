name: Release

# Tag a release: git tag v0.1.0-alpha.1 && git push --tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

jobs:
  images:
    name: Publish Docker images (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build + push (version tag + latest)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for part in server sidecar; do
            IMG="ghcr.io/${OWNER}/fhirengine-${part}"
            docker build -f "deploy/Dockerfile.${part}" -t "${IMG}:${GITHUB_REF_NAME}" -t "${IMG}:latest" .
            docker push "${IMG}:${GITHUB_REF_NAME}"
            docker push "${IMG}:latest"
          done

  release:
    name: Create GitHub release (+ SBOM)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/server/package-lock.json
      - run: npm ci
      # Full tree so the SBOM resolves the file:-linked workspace.
      - run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: packages/fhir-types
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > "sbom-${GITHUB_REF_NAME}.cdx.json"
      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in *-alpha*|*-beta*|*-rc*) PRERELEASE="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes $PRERELEASE \
            "sbom-${GITHUB_REF_NAME}.cdx.json#SBOM (CycloneDX)"
